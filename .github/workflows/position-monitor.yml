name: 持仓盯盘

on:
  # 常驻模式：交易日早上启动一次，脚本内部循环盯到收盘自动退出。
  # 不再用每30分钟的离散 cron 触发——那样会被 GitHub 延迟/排队/漏触发影响（今天就只触发了一次）。
  # 08:30 北京 (UTC 00:30) 提前启动排队，脚本内部等到 09:30 开盘开始盯，每30分钟一轮，15:00 收盘退出。
  # ⚠️ 定时任务已停用（改为本地运行）。如需恢复，取消下面 schedule 注释即可。
  # schedule:
  #   - cron: '30 0 * * 1-5'   # 工作日 08:30 北京时间（UTC 00:30）启动

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'loop'
        type: choice
        options:
          - loop          # 常驻循环（与定时一致）
          - now           # 立即跑一轮即退（测试用）

permissions:
  contents: write

# 独立 concurrency group：与选股监控互不干扰；新一轮不取消上一轮
concurrency:
  group: position-monitor
  cancel-in-progress: false

jobs:
  position-monitor:
    runs-on: ubuntu-latest
    # 常驻盯一整天：08:30 启动，脚本守到 15:00 收盘退出，给足超时余量
    timeout-minutes: 420

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r stocks/requirements.txt

      - name: Install Chromium for browser fallback
        # 持仓盯盘同样调用 fetch_capital_flow，东财限流时降级 Playwright 浏览器源，需安装 Chromium。
        run: python -m playwright install --with-deps chromium

      - name: Run position monitor
        timeout-minutes: 400
        env:
          POSITION_DINGTALK_WEBHOOK: ${{ secrets.POSITION_DINGTALK_WEBHOOK }}
          POSITION_DINGTALK_SECRET: ${{ secrets.POSITION_DINGTALK_SECRET }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "now" ]; then
            exec python -u stocks/position_monitor/position_monitor.py --now
          else
            exec python -u stocks/position_monitor/position_monitor.py
          fi
