name: 股票信号监控

on:
  # 定时任务：
  # - 每个交易日 08:30 北京时间 (UTC 00:30) 启动监控（提前1小时排队应对GitHub延迟，monitor.py内部等到09:25开盘）
  # - 每周一 07:00 北京时间 (UTC 周日 23:00) 更新股票列表 + ml-train
  # - 每个工作日 08:00 北京时间 (UTC 00:00) 更新股票列表（与周一07:00的ml-train错开1小时）
  schedule:
    - cron: '30 0 * * 1-5'    # 监控：工作日 08:30 北京时间（提前1小时排队，monitor.py 内部会等到09:25开盘）
    - cron: '0 23 * * 0'      # 更新列表：周一 07:00 北京时间（周日UTC23点=周一北京07点）+ ml-train
    - cron: '0 0 * * 1-5'      # 更新列表：工作日 08:00 北京时间（与周一07:00的ml-train错开1小时，避免被concurrency取消）
    - cron: '0 2 25 12 *'     # 提醒更新休市日历：每年12月25日 10:00 北京时间
    # 注：持仓盯盘已拆分到独立的 position-monitor.yml，避免与选股监控共享 concurrency group 而互相取消

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'loop'
        type: choice
        options:
          - loop
          - now
          - update_stock_list
      period:
        description: '选股周期 (仅now模式有效)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - 5min
          - 30min
          - 240min
      limit:
        description: '仅扫描前N只股票 (测试用, 0=全部)'
        required: false
        default: '0'
        type: string
      limit:
        description: '仅扫描前N只股票 (测试用, 0=全部)'
        required: false
        default: '0'
        type: string

permissions:
  contents: write

concurrency:
  group: stock-monitor
  cancel-in-progress: true

jobs:
  # 更新股票列表任务
  update-stock-list:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1-5' || github.event.schedule == '0 23 * * 0' || github.event.inputs.mode == 'update_stock_list'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install akshare
        run: pip install -r stocks/requirements.txt

      - name: Update stock list
        run: python stocks/更新股票列表.py

      - name: Commit stock list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/stock_list.md || true
          git diff --staged --quiet || git commit -m "更新股票列表 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
          # 先 pull rebase 合并远端变更，防止本地 push 期间有新提交导致 push 失败丢数据
          git pull --rebase --autostash || true
          git push || true

  # 股票监控任务
  monitor:
    runs-on: ubuntu-latest
    needs: update-stock-list
    # always() 确保：即使 update-stock-list 被 skip（schedule不匹配时），monitor 仍能运行
    # !cancelled() 排除被手动取消的情况；显式检查 needs.result 排除上游 failure
    if: |
      always() &&
      !cancelled() &&
      (needs.update-stock-list.result == 'success' || needs.update-stock-list.result == 'skipped') &&
      (github.event.schedule == '30 0 * * 1-5' || github.event.inputs.mode == 'loop' || github.event.inputs.mode == 'now')
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        # 依赖锁定在 stocks/requirements.txt（本地与 CI 共用），避免版本漂移
        run: pip install -r stocks/requirements.txt

      - name: Install Chromium for browser fallback
        # 资金流向 API 限流时降级到 Playwright 浏览器源，需安装 Chromium 内核及系统依赖。
        # --with-deps 自动装 Linux 运行所需的系统库（仅 ubuntu runner 需要）。
        run: python -m playwright install --with-deps chromium

      - name: Run monitor
        timeout-minutes: 340
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.limit }}" ] && [ "${{ github.event.inputs.limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.mode }}" = "now" ]; then
            exec python -u stocks/stock_monitor/monitor.py --now $LIMIT_ARG
          else
            exec python -u stocks/stock_monitor/monitor.py $LIMIT_ARG
          fi

      - name: Commit signals
        if: always() && !cancelled()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/stock_monitor/signals/ || true
          git add stocks/stock_monitor/sent_signals.json || true
          git add stocks/stock_list.md || true
          git add stocks/ml/shadow_data.json || true
          git diff --staged --quiet || git commit -m "更新信号数据 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
          git pull --rebase --autostash || true
          git push || true

  # 每周训练任务：回填实际结果 + 训练模型
  ml-train:
    runs-on: ubuntu-latest
    # 每周一 07:00 北京时间（周日UTC23点），与 update-stock-list 同一触发器
    if: github.event.schedule == '0 23 * * 0' || github.event.inputs.mode == 'update_stock_list'
    needs: update-stock-list

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        # 与 monitor 共用同一锁定清单，保证训练/加载 sklearn 版本一致
        run: pip install -r stocks/requirements.txt

      - name: Run weekly train
        run: python stocks/ml/weekly_train.py

      - name: Commit ml data & model
        if: "!cancelled()"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/ml/shadow_data.json stocks/ml/shadow_model.pkl stocks/ml/shadow_potential_model.pkl stocks/ml/shadow_gain_model.pkl stocks/ml/model_report.md || true
          git diff --staged --quiet || git commit -m "ML训练更新 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
          git pull --rebase --autostash || true
          git push || true

  # 每年12月25日提醒更新下一年休市日历
  holiday-reminder:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 25 12 *'

    steps:
      - name: Send reminder
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          python3 -c "
          import json, time, hmac, hashlib, base64, urllib.request, urllib.parse
          webhook = '${{ secrets.DINGTALK_WEBHOOK }}'
          secret = '${{ secrets.DINGTALK_SECRET }}'
          timestamp = str(round(time.time() * 1000))
          sign_str = f'{timestamp}\n{secret}'
          hmac_code = hmac.new(secret.encode(), sign_str.encode(), digestmod=hashlib.sha256).digest()
          sign = urllib.parse.quote_plus(base64.b64encode(hmac_code))
          url = f'{webhook}&timestamp={timestamp}&sign={sign}'
          msg = {
              'msgtype': 'markdown',
              'markdown': {
                  'title': '📅 休市日历更新提醒',
                  'text': '## 📅 休市日历更新提醒\n\n请尽快更新明年的A股休市日历：\n\n**文件**: stocks/stock_monitor/holidays.json\n\n证监会通常在12月底公布下一年休市安排，请搜索后让AI助手更新。\n\n> 未更新的话，明年假期会误触发监控推送重复数据。'
              }
          }
          data = json.dumps(msg).encode()
          req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'})
          with urllib.request.urlopen(req, timeout=15) as r:
              print(json.loads(r.read().decode()))
          "
