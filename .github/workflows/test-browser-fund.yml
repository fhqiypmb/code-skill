name: 浏览器资金源测试

# 手动触发：直接测试 fund_flow_browser 在 CI(Linux+GitHub IP) 上连续抓取多只股票，
# 验证浏览器资金降级是否可用。不走选股流程，几十秒出结果。

on:
  workflow_dispatch:
    inputs:
      codes:
        description: '股票代码(空格分隔)'
        required: false
        default: '300290 600519 000001 301368 600879'
        type: string

jobs:
  test-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r stocks/requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run browser fund test
        run: python -u stocks/fund_flow_browser.py ${{ github.event.inputs.codes }}
